name: Remote Update (CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Safe to turn this back on now!

      - name: Next.js Build Cache
        uses: actions/cache@v4
        with:
          # Tells GitHub exactly which folder to save
          path: .next/cache
          # Creates a unique fingerprint based on your dependencies and source files
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Create Environment File
        run: echo "${{ secrets.PROD_ENV_FILE }}" > .env

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Copy built files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          # Added src/generated/ so the server gets your custom Prisma client!
          # Also removed strip_components: 1 as it can sometimes swallow root files like package.json
          source: ".next/,public/,package.json,package-lock.json,prisma/,src/generated/" 
          target: "/home/prod/chatlyzer-web"

      - name: Update Server and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /home/prod/chatlyzer-web
            
            npm ci --omit=dev
            
            # We removed 'npx prisma generate' because GitHub already did it!
            npx prisma migrate deploy
            
            pm2 restart 0