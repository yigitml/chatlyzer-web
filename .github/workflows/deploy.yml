name: Remote Update (CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # FIX 1: Upgraded to Node 22 to satisfy Prisma requirements
          node-version: '22' 
          cache: 'npm'

      - name: Create Environment File
        # FIX 2: Named exactly .env so Prisma's postinstall script can find DATABASE_URL
        run: echo "${{ secrets.PRODUCTION_ENV_FILE }}" > .env

      - name: Install & Build
        run: |
          npm ci
          # Note: Since your package.json runs prisma generate automatically 
          # during postinstall, we actually don't need a separate step for it here!
          npm run build

      - name: Copy built files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          source: ".next/,public/,package.json,package-lock.json,prisma/" 
          target: "/home/prod/chatlyzer-web"
          strip_components: 1

      - name: Update Server and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /home/prod/chatlyzer-web
            
            # Install production dependencies
            npm ci --omit=dev
            
            # Generate Prisma client for the server's OS
            npx prisma generate
            npx prisma migrate deploy
            
            pm2 restart 0