name: Remote Update (CD)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, migrate, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Create production .env file
        shell: bash
        run: |
          set -e
          cat > .env <<'EOF'
          ${{ secrets.PROD_ENV_FILE }}
          EOF
          test -s .env
          grep -q '^DATABASE_URL=' .env
          grep -q '^JWT_SECRET=' .env
          grep -q '^NEXT_PUBLIC_GOOGLE_CLIENT_ID=' .env

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

      - name: Prepare staging directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            set -e
            rm -rf /home/prod/chatlyzer-web-update
            mkdir -p /home/prod/chatlyzer-web-update

      - name: Copy build artifacts to server staging directory
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          source: ".next/,public/,package.json,package-lock.json,prisma/,prisma.config.ts,src/generated/,.env"
          target: "/home/prod/chatlyzer-web-update"

      - name: Install production app, run migrations, and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            set -e

            echo "Preparing staged release..."
            cd /home/prod/chatlyzer-web-update
            test -s .env
            grep -q '^DATABASE_URL=' .env

            echo "Installing full dependencies so Prisma CLI is available..."
            npm ci --include=dev

            echo "Validating Prisma schema..."
            npx prisma validate

            echo "Applying database migrations before switching traffic..."
            npx prisma migrate deploy

            echo "Regenerating Prisma client after migrations..."
            npx prisma generate

            echo "Pruning development dependencies for production runtime..."
            npm prune --omit=dev

            echo "Swapping staged release into production..."
            cd /home/prod
            rm -rf chatlyzer-web-backup
            if [ -d chatlyzer-web ]; then
              mv chatlyzer-web chatlyzer-web-backup
            fi
            mv chatlyzer-web-update chatlyzer-web

            echo "Restarting PM2 with updated environment..."
            cd /home/prod/chatlyzer-web
            pm2 restart 0 --update-env

            echo "Deployment completed successfully."
