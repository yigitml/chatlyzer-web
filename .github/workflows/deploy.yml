name: Remote Update (CD)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Safe to turn this back on now!

      - name: Next.js Build Cache
        uses: actions/cache@v4
        with:
          # Tells GitHub exactly which folder to save
          path: .next/cache
          # Creates a unique fingerprint based on your dependencies and source files
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Create Environment File
        run: echo "${{ secrets.PROD_ENV_FILE }}" > .env

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Copy built files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          # 1. Added .env to the transfer list
          source: ".next/,public/,package.json,package-lock.json,prisma/,src/generated/,.env" 
          # 2. Upload to a STAGING folder, not the live one!
          target: "/home/prod/chatlyzer-web-update" 

      - name: Update Server and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            # 1. Go into the staging folder and prep the new app
            cd /home/prod/chatlyzer-web-update
            npm ci --omit=dev
            npx prisma migrate deploy
            
            # 2. The Atomic Swap
            cd /home/prod
            rm -rf chatlyzer-web-backup               # Delete the old backup if it exists
            mv chatlyzer-web chatlyzer-web-backup     # Move the currently live site to backup
            mv chatlyzer-web-update chatlyzer-web     # Instantly make the newly prepped app live
            
            # 3. Restart PM2
            pm2 restart 0