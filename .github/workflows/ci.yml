name: Web CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Create CI env file
        shell: bash
        run: |
          set -e
          if [ -n "${{ secrets.PROD_ENV_FILE }}" ]; then
            cat > .env <<'EOF'
          ${{ secrets.PROD_ENV_FILE }}
          EOF
          else
            cat > .env <<'EOF'
          DATABASE_URL="postgresql://ci:ci@localhost:5432/chatlyzer_ci"
          JWT_SECRET="ci-jwt-secret"
          REFRESH_TOKEN_SECRET="ci-refresh-token-secret"
          OPENAI_API_KEY="ci-openai-key"
          GOOGLE_OAUTH2_URL="https://www.googleapis.com/oauth2/v3"
          NEXT_PUBLIC_GOOGLE_CLIENT_ID="ci-google-client-id.apps.googleusercontent.com"
          NEXT_PUBLIC_POSTHOG_KEY=""
          NEXT_PUBLIC_POSTHOG_HOST="https://us.i.posthog.com"
          EOF
          fi
          test -s .env
          grep -q '^DATABASE_URL=' .env

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
